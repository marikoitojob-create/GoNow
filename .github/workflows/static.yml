# シンプルな静的サイト公開用のワークフロー
name: Deploy static content to Pages

on:
  # メインブランチへのプッシュ時に実行
  push:
    branches: ["main"]
  # 手動実行も可能にする
  workflow_dispatch:

# 権限の設定（GitHub Pagesへの書き込みを許可）
permissions:
  contents: read
  pages: write
  id-token: write

# 連続実行時に古いジョブをキャンセルする
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/setup-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # リポジトリのルート（index.htmlがある場所）をアップロード
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
